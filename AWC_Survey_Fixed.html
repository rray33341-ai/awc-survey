```html
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C2410C">
<title>AWC Survey — बनवासपुर</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<!-- Excel Export Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
:root{ --s1:#EA580C; --s2:#C2410C; --sg:linear-gradient(135deg, #EA580C 0%, #9A3412 100%); --shadow:0 10px 25px -5px rgba(0,0,0,0.1); }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit','Noto Sans Devanagari',sans-serif;background:#FFF7ED;color:#1F2937;min-height:100vh;}
.header{background:var(--sg);padding:20px 15px 30px;color:white;position:sticky;top:0;z-index:50;border-radius:0 0 25px 25px;box-shadow:0 4px 15px rgba(0,0,0,0.15);}
.header-top{display:flex;align-items:center;gap:12px;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px;}
.stat-card{background:white;border-radius:15px;padding:10px;text-align:center;box-shadow:var(--shadow);}
.stat-val{display:block;font-size:20px;font-weight:900;color:var(--s2);}
.stat-lbl{display:block;font-size:10px;color:#6B7280;font-weight:700;}

.content{padding:15px 15px 100px;max-width:600px;margin:0 auto;}
.card{background:white;border-radius:24px;padding:20px;margin-bottom:20px;box-shadow:var(--shadow);}
.section-title{display:flex;align-items:center;gap:10px;margin-bottom:18px;color:var(--s2);font-weight:800;font-size:15px;}

input,select{width:100%;padding:14px;background:#F9FAFB;border:2px solid #F3F4F6;border-radius:16px;font-size:15px;margin-bottom:15px;font-family:inherit;}
label{font-size:12px;font-weight:700;color:#4B5563;margin-left:5px;display:block;margin-bottom:5px;}

.btn-save{background:var(--sg);color:white;width:100%;padding:16px;border-radius:18px;font-weight:800;border:none;box-shadow:0 8px 20px rgba(234,88,12,0.3);cursor:pointer;}
.record-item{background:white;padding:15px;border-radius:20px;margin-bottom:12px;border-left:5px solid var(--s1);box-shadow:0 4px 6px rgba(0,0,0,0.05);}

.nav-bar{position:fixed;bottom:0;left:0;right:0;background:white;height:70px;display:flex;justify-content:space-around;align-items:center;border-top:1px solid #F3F4F6;}
.nav-item{text-align:center;color:#9CA3AF;font-size:10px;font-weight:700;flex:1;}
.nav-item.active{color:var(--s1);}
.nav-icon{font-size:22px;display:block;}

#login-screen{position:fixed;inset:0;background:var(--sg);z-index:1000;display:flex;justify-content:center;align-items:center;padding:20px;color:white;text-align:center;}
</style>
</head>
<body>

<div id="login-screen">
  <div>
    <h1 style="font-size:32px;margin-bottom:10px;">AWC SURVEY</h1>
    <p style="margin-bottom:30px;opacity:0.8;">Admin Authentication</p>
    <input type="password" id="login-pin" placeholder="ACCESS PIN" style="background:white;text-align:center;">
    <button onclick="checkPin()" class="btn-save" style="background:white;color:var(--s2);">LOGIN</button>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div style="font-size:24px;">🏥</div>
    <div><h1 style="font-size:18px;">AWC Survey</h1><p style="font-size:11px;opacity:0.8;">बनवासपुर • BLO 182</p></div>
    <button onclick="syncData()" id="sync-btn" style="margin-left:auto;background:rgba(255,255,255,0.2);color:white;padding:5px 15px;border-radius:20px;border:none;font-weight:700;">Sync</button>
  </div>
  <div class="stats-row">
    <div class="stat-card"><span id="stat-h" class="stat-val">0</span><span class="stat-lbl">घर</span></div>
    <div class="stat-card"><span id="stat-m" class="stat-val">0</span><span class="stat-lbl">सदस्य</span></div>
    <div class="stat-card"><span id="stat-p" class="stat-val">0</span><span class="stat-lbl">गर्भवती</span></div>
  </div>
</div>

<div class="content">
  <div id="view-add" class="tab-view">
    <div class="card">
      <div class="section-title">🏠 Details</div>
      <label>HOUSE NO. *</label><input type="text" id="houseNo" placeholder="A-12">
      <label>FAMILY SERIAL *</label><input type="number" id="famSerial" placeholder="1">
      <label>MEMBER NAME *</label><input type="text" id="name" placeholder="Naam">
      <label>FATHER / HUSBAND *</label><input type="text" id="father" placeholder="Pita ka naam">
      <label>RELATION</label><select id="relation"><option value="Head">Head</option><option value="Wife">Wife</option><option value="Son">Son</option><option value="Daughter">Daughter</option></select>
      <label>AGE</label><input type="number" id="age" placeholder="Umra">
      <label>GENDER</label><select id="gender"><option value="Male">Male</option><option value="Female">Female</option></select>
      <label>CASTE</label><select id="caste"><option value="OBC">OBC</option><option value="SC">SC</option><option value="GEN">General</option></select>
      <label>AADHAR</label><input type="number" id="aadhar" placeholder="Aadhar Number">
      <label>MOBILE</label><input type="number" id="mobile" placeholder="Mobile Number">
      <button onclick="saveRecord()" class="btn-save">SUBMIT DATA</button>
    </div>
  </div>

  <div id="view-records" class="tab-view" style="display:none;">
    <input type="text" id="search" placeholder="Search..." oninput="renderRecords()">
    <div id="records-list"></div>
  </div>

  <div id="view-supervisor" class="tab-view" style="display:none;">
    <div class="card">
      <div class="section-title">📊 Management</div>
      <button onclick="exportToExcel()" class="btn-save">EXPORT COLORFUL EXCEL</button>
      <button onclick="logout()" style="margin-top:20px;background:white;color:red;border:1px solid red;width:100%;padding:10px;border-radius:10px;">Logout</button>
    </div>
  </div>
</div>

<div class="nav-bar">
  <div class="nav-item active" onclick="switchTab('add', this)">ADD</div>
  <div class="nav-item" onclick="switchTab('records', this)">RECORDS</div>
  <div class="nav-item" onclick="switchTab('supervisor', this)">EXPORT</div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSy...", authDomain: "awo-banvaspur.firebaseapp.com", projectId: "awo-banvaspur" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let members = JSON.parse(localStorage.getItem('awc_members_v2') || '[]');

window.onload = () => { if(localStorage.getItem('awc_logged') === 'true') document.getElementById('login-screen').style.display='none'; updateStats(); };

function checkPin() { if(document.getElementById('login-pin').value==='193'){ localStorage.setItem('awc_logged','true'); document.getElementById('login-screen').style.display='none';} }
function logout() { localStorage.removeItem('awc_logged'); location.reload(); }

function switchTab(t, el) { 
  document.querySelectorAll('.tab-view').forEach(v => v.style.display='none');
  document.getElementById('view-'+t).style.display='block';
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active'); if(t==='records') renderRecords();
}

function updateStats() {
  document.getElementById('stat-m').innerText = members.length;
  document.getElementById('stat-h').innerText = new Set(members.map(m=>m.houseNo)).size;
}

function saveRecord() {
  const r = { id:Date.now().toString(), houseNo:document.getElementById('houseNo').value, famSerial:document.getElementById('famSerial').value, name:document.getElementById('name').value, father:document.getElementById('father').value, relation:document.getElementById('relation').value, age:document.getElementById('age').value, gender:document.getElementById('gender').value, caste:document.getElementById('caste').value, aadhar:document.getElementById('aadhar').value, mobile:document.getElementById('mobile').value, synced:false };
  if(!r.name || !r.houseNo) return alert('Name & House No are required!');
  members.push(r); localStorage.setItem('awc_members_v2', JSON.stringify(members));
  updateStats(); alert('Saved!');
}

function renderRecords() {
  const list = document.getElementById('records-list'); list.innerHTML = '';
  members.forEach(m => {
    const d = document.createElement('div'); d.className='record-item';
    d.innerHTML = `<b>${m.name}</b><br><small>H.No: ${m.houseNo} | Age: ${m.age}</small>`;
    list.appendChild(d);
  });
}

async function syncData() {
  for(let m of members) { if(!m.synced) { await db.collection('survey_data').doc(m.id).set(m); m.synced=true; } }
  localStorage.setItem('awc_members_v2', JSON.stringify(members)); alert('Synced!');
}

// 100% ACCURATE COLORFUL EXPORT FUNCTION
async function exportToExcel() {
  const workbook = new ExcelJS.Workbook();
  const worksheet = workbook.addWorksheet('AWC Data');

  worksheet.columns = [
    { header: 'HOUSE NO.', key: 'houseNo', width: 15 },
    { header: 'FAMILY SERIAL', key: 'famSerial', width: 15 },
    { header: 'MEMBER NAME', key: 'name', width: 25 },
    { header: 'FATHER/HUSBAND NAME', key: 'father', width: 25 },
    { header: 'RELATION', key: 'relation', width: 15 },
    { header: 'AGE', key: 'age', width: 10 },
    { header: 'GENDER', key: 'gender', width: 10 },
    { header: 'CASTE', key: 'caste', width: 12 },
    { header: 'AADHAR', key: 'aadhar', width: 20 },
    { header: 'MOBILE', key: 'mobile', width: 15 }
  ];

  const headerRow = worksheet.getRow(1);
  headerRow.eachCell((cell) => {
    cell.font = { bold: true, color: { argb: 'FFFFFF' } };
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: '4F81BD' } };
    cell.alignment = { horizontal: 'center' };
  });

  members.forEach(m => worksheet.addRow(m));

  const buffer = await workbook.xlsx.writeBuffer();
  saveAs(new Blob([buffer]), "AWC_Survey_Report.xlsx");
}
</script>
</body>
</html>
